name: CI — RecargaYa

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Correr tests unitarios (pytest)
        run: pytest tests/test_recargas.py -v

      - name: Correr escenarios BDD (behave)
        run: behave features/

      - name: Levantar servidor FastAPI en background
        run: uvicorn app.main:app --host 0.0.0.0 --port 8000 &
        env:
          PYTHONPATH: .

      - name: Esperar que el servidor esté listo
        run: |
          for i in {1..10}; do
            curl -sf http://localhost:8000/docs && break
            sleep 2
          done

      - name: Correr prueba de carga Locust (headless)
        run: |
          locust -f tests/locustfile.py \
            --headless \
            -u 30 \
            -r 10 \
            --run-time 30s \
            --host http://localhost:8000 \
            --csv=locust_results \
            --exit-code-on-error 1

      - name: Verificar P95 < 300ms
        run: |
          python - <<'EOF'
          import csv, sys
          with open("locust_results_stats.csv") as f:
              for row in csv.DictReader(f):
                  if row["Name"] == "/recargas":
                      p95 = float(row["95%"])
                      print(f"P95: {p95}ms")
                      if p95 >= 300:
                          print("FALLO: P95 >= 300ms")
                          sys.exit(1)
                      print("OK: P95 < 300ms")
          EOF
